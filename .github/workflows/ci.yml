name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  server-lint-test:
    name: Server — Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Lint server
        working-directory: server
        run: npm run lint

      - name: Test server
        working-directory: server
        run: npm test
        env:
          MONGO_URI: mongodb://localhost:27017/event-booking-test
          JWT_SECRET: ci-test-jwt-secret
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
          CLIENT_URL: http://localhost:5173

  client-lint-test:
    name: Client — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint client
        working-directory: client
        run: npm run lint

      - name: Test client
        working-directory: client
        run: npm test -- --run
        env:
          VITE_API_URL: http://localhost:5000/api
